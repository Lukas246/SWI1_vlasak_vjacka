# 1. ZM?NA: Nastavíme 'create-drop', aby se tabulky p?i startu smazaly a vytvo?ily znovu ?isté.
# Pokud bys nechal 'update', data.sql by se pokou?ela vkládat duplicity p?i ka?dém restartu.
