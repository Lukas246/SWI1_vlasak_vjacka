spring.application.name=backend
spring.datasource.url=jdbc:mariadb://localhost:3306/music_store
spring.datasource.username=seller
spring.datasource.password=makeMoney123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# 1. ZMENA: Nastavime 'create-drop', aby se tabulky pri startu smazaly a vytvorily znovu ciste.
# Pokud bys nechal 'update', data.sql by se pokousela vkladat duplicity pri kazdem restartu.
spring.jpa.hibernate.ddl-auto=create

# 2. PRIDANI: Povolime inicializaci SQL skriptu (data.sql)
spring.sql.init.mode=always

# 3. KLICOVE NASTAVENI: Hibernate musi nejdive vytvorit tabulky a az PAK se spusti data.sql.
# Bez tohoto radku aplikace spadne, protoze tabulky v momentu spusteni skriptu jeste neexistuji.
spring.jpa.defer-datasource-initialization=true

# Volitelne: Uvidis v konzoli, co presne Hibernate a SQL skript delaji
spring.jpa.show-sql=true

# Change port to avoid conflict
server.port=8080
